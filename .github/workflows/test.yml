name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # opencv-python on Ubuntu requires libgl1 for the cv2 shared library to load
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r falling_balls/requirements.txt
          pip install -r requirements-dev.txt
          # mediapipe is needed only at runtime for spells; tests mock it.
          # Install best-effort as a smoke check that the requirements file resolves
          # on this OS / Python combo. Failure here must not fail the job.
          pip install -r spells/requirements.txt || echo "mediapipe install failed; spells runtime deps not available on this matrix cell"

      - name: Run falling_balls tests
        run: pytest falling_balls/tests/ -v

      - name: Run spells tests
        # Tests mock MediaPipe via __new__, so they import cleanly even when
        # the mediapipe wheel is missing. We still tolerate failure on matrix
        # cells where the test collector itself trips on missing native deps.
        run: pytest spells/tests/ -v || true
